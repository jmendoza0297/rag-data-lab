# ==============================================================================
# RAG Data Lab Inspector — Docker Compose
# ==============================================================================
# Levanta 4 servicios: Django (web), Celery Worker, Redis, Qdrant
# Ollama se ejecuta NATIVO en el host Ubuntu (fuera de Docker) para GPU.
#
# Uso:
#   docker compose up -d              # Levantar todo
#   docker compose up -d --build      # Reconstruir y levantar
#   docker compose logs -f web        # Ver logs de Django
#   docker compose logs -f celery-worker  # Ver logs de Celery
#   docker compose down               # Detener todo
#   docker compose down -v            # Detener y borrar volúmenes
# ==============================================================================

services:
  # ── Django + RAG Pipeline (Gunicorn) ──
  web:
    build: .
    container_name: rag-web
    ports:
      - "8000:8000"
    volumes:
      # Datos persistentes (no se pierden al reiniciar)
      - ./media:/app/media
      - ./storage:/app/storage
    env_file: .env
    environment:
      - SERVICE_TYPE=web
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      # Permite acceder a Ollama en el host desde dentro del contenedor
      # En Linux: host.docker.internal → IP del host
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Celery Worker (Procesamiento Asíncrono) ──
  celery-worker:
    build: .
    container_name: rag-celery
    volumes:
      - ./media:/app/media
      - ./storage:/app/storage
    env_file: .env
    environment:
      - SERVICE_TYPE=celery
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Redis (Broker para Celery) ──
  redis:
    image: redis:alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Qdrant (Base de Datos Vectorial) ──
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
